services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wss_development
      POSTGRES_USER: wss
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
    
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wss -d wss_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      DATABASE_URL: postgresql://wss:password@db:5432/wss_development
      DATABASE_HOST: db
      DATABASE_USERNAME: wss
      DATABASE_PASSWORD: password
      DATABASE_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bin/dev
    stdin_open: true
    tty: true
    extra_hosts:
      - "dev.whiskeysharesociety.com:127.0.0.1"

  stripe-cli:
    image: stripe/stripe-cli:latest
    command: listen --forward-to web:3000/webhooks/stripe --skip-verify
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_DEVICE_NAME: docker-dev
    depends_on:
      - web
    profiles:
      - stripe

volumes:
  postgres_data:
  redis_data:
  bundle_cache: