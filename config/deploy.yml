# Kamal production config. Deploys to the Hetzner CPX box; Postgres runs as a
# Kamal accessory on the same host; Cloudflare fronts DNS/CDN (SSL mode: Full).
# Secrets come from .kamal/secrets, which pulls from your shell env — see
# docs/launch-checklist.md for the full first-deploy runbook.
service: wss
# registry.server (ghcr.io) is prepended automatically — don't repeat it here.
image: wsethbrown/wss

servers:
  web:
    - 178.156.251.37
  # LibreOffice deck-rendering is memory-heavy and must NEVER run inside the
  # web container (it would stall page serving) — jobs get their own container.
  job:
    hosts:
      - 178.156.251.37
    cmd: bin/jobs

proxy:
  ssl: true
  hosts:
    - whiskeysharesociety.com
    - www.whiskeysharesociety.com

registry:
  server: ghcr.io
  username: wsethbrown
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    # Postgres (accessory below uses the same password via .kamal/secrets)
    - WSS_DATABASE_PASSWORD
    # Losing these = losing all 2FA data. Keep offline backups.
    - AR_ENCRYPTION_PRIMARY_KEY
    - AR_ENCRYPTION_DETERMINISTIC_KEY
    - AR_ENCRYPTION_KEY_DERIVATION_SALT
    # OAuth (production redirect URIs must be added in the Google console)
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - APPLE_CLIENT_ID
    - APPLE_TEAM_ID
    - APPLE_KEY_ID
    - APPLE_PRIVATE_KEY
    # Stripe LIVE mode
    - STRIPE_SECRET_KEY
    - STRIPE_PUBLISHABLE_KEY
    - STRIPE_WEBHOOK_SECRET
    - STRIPE_MONTHLY_PRICE_ID
    - STRIPE_QUARTERLY_PRICE_ID
    - STRIPE_YEARLY_PRICE_ID
    - STRIPE_FOUNDING_SOCIETY_PRICE_ID
    - STRIPE_FOUNDING_MONTHLY_PRICE_ID
    # Error alerting (inert if blank)
    - SENTRY_DSN
    # Cloudflare R2: uploads (Active Storage) + nightly DB backups
    - R2_ENDPOINT
    - R2_ACCESS_KEY_ID
    - R2_SECRET_ACCESS_KEY
    - R2_BUCKET
    # Transactional email (Devise resets/verifications); blank = mail disabled
    - SMTP_ADDRESS
    - SMTP_USERNAME
    - SMTP_PASSWORD
  clear:
    # The Postgres accessory's name on Kamal's docker network.
    DATABASE_HOST: wss-db
    DATABASE_USERNAME: wss
    WEB_CONCURRENCY: 2
    JOB_CONCURRENCY: 1
    RAILS_LOG_LEVEL: info
    SMTP_PORT: 587

# bin/kamal <alias>
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"
  backup: app exec --reuse "bin/rails runner DatabaseBackupJob.perform_now"

# Local Active Storage is only a scratch path in production (uploads live in
# R2), but keep the volume so tmp/persisted files survive deploys.
volumes:
  - "wss_storage:/rails/storage"

# Bridge fingerprinted assets between versions during rolling deploys.
asset_path: /rails/public/assets

builder:
  arch: amd64
  # Building amd64 images from an Apple Silicon Mac uses emulation (slow but
  # fine). If deploys feel long, enable a remote builder on the server:
  # remote: ssh://root@178.156.251.37

accessories:
  db:
    image: postgres:15
    host: 178.156.251.37
    # Bound to localhost only — reachable from containers, never the internet.
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: wss
        POSTGRES_DB: wss_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
