<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Font substitutions for deck slide rendering (LibreOffice in the jobs
  container). Decks authored on macOS/Windows use fonts we can't ship;
  without a mapping, fontconfig falls back to fonts with different
  metrics and the rendered slides show broken kerning/spacing.

  Calibri/Cambria are already covered by metric-compatible packages
  (fonts-crosextra-carlito / -caladea) which register their own aliases.
-->
<fontconfig>
  <!-- Georgia → Gelasio (Google's metric-compatible Georgia) -->
  <match target="pattern">
    <test name="family"><string>Georgia</string></test>
    <edit name="family" mode="assign" binding="same"><string>Gelasio</string></edit>
  </match>

  <!-- Gill Sans (and its common variants) → Gillius ADF -->
  <match target="pattern">
    <test name="family"><string>Gill Sans</string></test>
    <edit name="family" mode="assign" binding="same"><string>Gillius ADF</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Gill Sans MT</string></test>
    <edit name="family" mode="assign" binding="same"><string>Gillius ADF</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Gill Sans Light</string></test>
    <edit name="family" mode="assign" binding="same"><string>Gillius ADF</string></edit>
  </match>
</fontconfig>
